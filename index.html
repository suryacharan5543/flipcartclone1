<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flipkart Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f1f3f6; }

    header {
      background:#2874f0; color:white;
      display:flex; justify-content:space-between;
      padding:10px 20px; align-items:center;
    }

    .search input {
      width:300px; padding:8px;
      border:none;
    }

    .products {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
      padding:20px;
    }

    .card {
      background:white;
      padding:10px;
      text-align:center;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width:100%;
      height:120px;
      object-fit:contain;
    }

    button {
      background:#ff9f00;
      border:none;
      padding:8px;
      color:white;
      cursor:pointer;
      margin-top:10px;
    }

    .cart-box {
      position:fixed;
      right:0;
      top:60px;
      width:250px;
      background:white;
      height:100%;
      display:none;
      padding:10px;
      border-left:2px solid #ccc;
    }
  </style>
</head>

<body>

<header>
  <h2>Flipkart</h2>

  <div class="search">
    <input id="search" onkeyup="searchProducts()" placeholder="Search">
  </div>

  <div onclick="toggleCart()">
    Cart (<span id="count">0</span>)
  </div>
</header>

<div class="products" id="products"></div>

<div class="cart-box" id="cartBox">
  <h3>Cart</h3>
  <ul id="cartItems"></ul>
</div>

<script>
const products = [
  {id:1,name:"iPhone",price:70000,img:"https://via.placeholder.com/150"},
  {id:2,name:"Laptop",price:50000,img:"https://via.placeholder.com/150"},
  {id:3,name:"Shoes",price:1500,img:"https://via.placeholder.com/150"}
];

let cart = [];

/* SHOW PRODUCTS */
function showProducts(list){
  const box = document.getElementById("products");
  box.innerHTML = "";

  list.forEach(p=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${p.id})">Add</button>
      </div>
    `;
  });
}

/* ADD TO CART */
function addToCart(id){
  const item = products.find(p=>p.id===id);
  cart.push(item);
  updateCart();
}

/* UPDATE CART */
function updateCart(){
  const list = document.getElementById("cartItems");
  const count = document.getElementById("count");

  list.innerHTML="";
  let total=0;

  cart.forEach((item,i)=>{
    total+=item.price;
    list.innerHTML += `
      <li>
        ${item.name} - ₹${item.price}
        <button onclick="removeItem(${i})">X</button>
      </li>
    `;
  });

  list.innerHTML += `<h4>Total: ₹${total}</h4>`;
  count.innerText = cart.length;
}

/* REMOVE */
function removeItem(i){
  cart.splice(i,1);
  updateCart();
}

/* SEARCH */
function searchProducts(){
  const val = document.getElementById("search").value.toLowerCase();
  const filtered = products.filter(p=>p.name.toLowerCase().includes(val));
  showProducts(filtered);
}

/* TOGGLE CART */
function toggleCart(){
  const box = document.getElementById("cartBox");
  box.style.display = box.style.display==="block" ? "none":"block";
}

/* LOAD */
showProducts(products);
</script>

</body>
</html>
